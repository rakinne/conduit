<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T H E · E N D · H E A D — FLAME</title>
<style>
  :root{
    --grid-green:#00ff66;
    --deep:#020803;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--deep);}
  body{font-family:"Courier New",monospace;}

  #rain{position:fixed;inset:0;z-index:0;opacity:.28;}
  #scene{position:fixed;inset:0;z-index:1;}

  .vignette{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at center,
      transparent 40%, rgba(0,8,2,.55) 78%, rgba(0,4,1,.92) 100%);
  }
  .scanlines{
    position:fixed;inset:0;z-index:3;pointer-events:none;opacity:.18;
    background:repeating-linear-gradient(0deg,
      rgba(0,0,0,.35) 0 1px, transparent 1px 3px);
  }

  header{
    position:fixed;top:28px;left:0;right:0;z-index:4;
    text-align:center;pointer-events:none;
  }
  header h1{
    color:var(--grid-green);
    font-size:clamp(14px,2.2vw,22px);
    letter-spacing:.9em;text-indent:.9em;
    font-weight:400;
    text-shadow:0 0 8px rgba(0,255,102,.8),0 0 28px rgba(0,255,102,.35);
    animation:flicker 6s infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:1}
    92%{opacity:1}
    93%{opacity:.45}
    94%{opacity:1}
    97%{opacity:.7}
    98%{opacity:1}
  }
  footer{
    position:fixed;bottom:26px;left:0;right:0;z-index:4;
    text-align:center;pointer-events:none;
  }
  footer p{
    color:rgba(0,255,102,.55);
    font-size:11px;letter-spacing:.35em;text-indent:.35em;
    min-height:14px;
  }
  footer p.resequencing{
    color:#aaffcc;
    text-shadow:0 0 10px rgba(0,255,102,.9);
    animation:statblink .12s infinite;
  }
  @keyframes statblink{50%{opacity:.4}}
  #uplink{
    position:fixed;bottom:54px;left:50%;transform:translateX(-50%);
    z-index:5;display:none;gap:8px;align-items:center;
  }
  #uplink input{
    width:min(420px,70vw);padding:8px 12px;
    background:rgba(0,20,8,.85);border:1px solid rgba(0,255,102,.35);
    color:var(--grid-green);font-family:"Courier New",monospace;
    font-size:12px;letter-spacing:.15em;outline:none;
  }
  #uplink input::placeholder{color:rgba(0,255,102,.35);}
  #uplink input:focus{border-color:rgba(0,255,102,.8);
    box-shadow:0 0 12px rgba(0,255,102,.25);}
  #uplink button{
    padding:8px 14px;background:rgba(0,255,102,.12);
    border:1px solid rgba(0,255,102,.5);color:var(--grid-green);
    font-family:"Courier New",monospace;font-size:11px;
    letter-spacing:.25em;cursor:pointer;
  }
  #uplink button:hover{background:rgba(0,255,102,.25);}
  #uplink button:disabled{opacity:.35;cursor:wait;}

  /* ---- ASK-STATE CAPTION (visible ask feedback under the head) -------
     The overlay hides the footer #status, so ask-state needs its own
     home here. Dark backing keeps green text legible over ANY desktop. */
  #ask-caption{
    position:fixed;bottom:92px;left:50%;transform:translateX(-50%);
    z-index:5;max-width:min(440px,80vw);text-align:center;
    font-family:"Courier New",monospace;font-size:12px;letter-spacing:.18em;
    color:var(--grid-green);padding:4px 12px;border-radius:3px;
    background:rgba(0,16,6,.7);
    text-shadow:0 0 8px rgba(0,255,102,.7);
    opacity:0;transition:opacity .25s;pointer-events:none;
  }
  #ask-caption.show{opacity:1;}
  #ask-caption.thinking{animation:statblink .6s infinite;}
  #ask-caption.loading,#ask-caption.offline{color:rgba(0,255,102,.5);text-shadow:none;}
  #ask-caption.error{color:#ff7a7a;text-shadow:0 0 8px rgba(255,80,80,.6);
    background:rgba(26,4,4,.72);}

  /* ---- DESKTOP OVERLAY MODE (driven by the native Swift shell) -------
     Strips the framed "box" so only the head floats on transparency.
     Activated when window.__CONDUIT_OVERLAY is set (or ?overlay in URL);
     has no effect in a normal browser session. */
  html.overlay,html.overlay body{background:transparent !important;}
  body.overlay #rain,
  body.overlay .vignette,
  body.overlay .scanlines,
  body.overlay header,
  body.overlay footer{display:none !important;}
  /* faint frame + grab cursor while the shell is in "grab" mode */
  body.overlay.grab{cursor:grab;}
  body.overlay.grab::after{
    content:"";position:fixed;inset:0;z-index:9;pointer-events:none;
    border:1px solid rgba(0,255,102,.22);
  }
</style>
</head>
<body>
<canvas id="rain"></canvas>
<div id="scene"></div>
<div class="vignette"></div>
<div class="scanlines"></div>
<header><h1>THE END</h1></header>
<footer><p id="status">FORM 01 · STABLE — MOVE THE CURSOR, IT WATCHES</p></footer>
<div id="ask-caption" role="status" aria-live="polite"></div>
<div id="uplink">
  <input id="uplink-text" type="text" maxlength="400"
         placeholder="TYPE — THE HEAD WILL SPEAK" autocomplete="off">
  <button id="uplink-send">TRANSMIT</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="head_data.js"></script>
<!-- optional: speech animation baked by tools/bake_anim.py; a 404 here is harmless -->
<script src="anim_data.js"></script>
<script>
/* ============================================================
   0. OVERLAY GATE
   The native desktop shell sets window.__CONDUIT_OVERLAY before this
   script runs (?overlay=1 also works in a browser). In overlay mode the
   framed box is hidden and the head is driven by the shell's global
   cursor feed via window.__conduitPoint(). Inert in normal sessions.
   ============================================================ */
const OVERLAY = !!window.__CONDUIT_OVERLAY
             || new URLSearchParams(location.search).has('overlay');
if(OVERLAY){
  document.documentElement.classList.add('overlay');
  document.body.classList.add('overlay');          // script runs at end of <body>
}

/* ============================================================
   1. MATRIX RAIN BACKDROP
   ============================================================ */
const rainCv = document.getElementById('rain');
const rctx = rainCv.getContext('2d');
let cols, drops;
const GLYPHS = 'アカサタナハマヤラワ0123456789ｱｲｳｴｵ<>=/*+';
function sizeRain(){
  rainCv.width = innerWidth; rainCv.height = innerHeight;
  cols = Math.floor(innerWidth/16);
  drops = Array.from({length:cols},()=>Math.random()*innerHeight/16);
}
sizeRain();
setInterval(()=>{
  rctx.fillStyle='rgba(2,8,3,0.12)';
  rctx.fillRect(0,0,rainCv.width,rainCv.height);
  rctx.font='14px monospace';
  for(let i=0;i<cols;i++){
    const ch = GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
    rctx.fillStyle = Math.random()>.97 ? '#aaffcc' : '#00cc55';
    rctx.fillText(ch, i*16, drops[i]*16);
    drops[i] = (drops[i]*16 > rainCv.height && Math.random()>.975) ? 0 : drops[i]+1;
  }
},66);

/* ============================================================
   2. ANIMATED CIRCUIT-GRID TEXTURE (with glitch tearing)
   ============================================================ */
const TEX = 1024, CELL = 14, GAP = 3;
const texCv = document.createElement('canvas');
texCv.width = texCv.height = TEX;
const tctx = texCv.getContext('2d');
const nCells = Math.floor(TEX/CELL);
const cellBase = [];
for(let y=0;y<nCells;y++){
  cellBase[y]=[];
  for(let x=0;x<nCells;x++){
    const band = Math.sin(x*0.55)*0.5+0.5;
    const noise = Math.random();
    let b = 0.18 + band*0.35 + noise*0.45;
    if(Math.random()<0.06) b = 1.2;
    if(Math.random()<0.08) b = 0.05;
    cellBase[y][x]=b;
  }
}
let glitchLevel = 0;
function paintGrid(t){
  tctx.fillStyle='#000400';
  tctx.fillRect(0,0,TEX,TEX);
  const flickP = 0.015 + glitchLevel*0.18;
  for(let y=0;y<nCells;y++){
    for(let x=0;x<nCells;x++){
      const pulse = Math.sin(t*0.0012 + y*0.35)*0.18;
      const flick = (Math.random()<flickP)? (Math.random()*0.9-0.35) : 0;
      let b = Math.min(1.4, Math.max(0.02, cellBase[y][x] + pulse + flick));
      const g = Math.floor(120 + 135*Math.min(1,b));
      const r = Math.floor(20*b);
      const bl = Math.floor(70*Math.min(1,b));
      tctx.fillStyle = `rgba(${r},${g},${bl},${Math.min(1,b)})`;
      const wide = ((x*7+y*13)%9===0);
      tctx.fillRect(x*CELL+GAP, y*CELL+GAP,
                    CELL-GAP*2 + (wide?CELL*0.6:0), CELL-GAP*2);
    }
  }
  if(glitchLevel > 0.05){
    const tears = Math.floor(glitchLevel*9);
    for(let i=0;i<tears;i++){
      const y = Math.random()*TEX;
      const h = 6 + Math.random()*26;
      const shift = (Math.random()-0.5)*120*glitchLevel;
      tctx.drawImage(texCv, 0,y,TEX,h, shift,y,TEX,h);
    }
  }
}
paintGrid(0);
const gridTex = new THREE.CanvasTexture(texCv);
gridTex.wrapS = gridTex.wrapT = THREE.RepeatWrapping;
gridTex.repeat.set(3,2);

/* ============================================================
   3. SCENE
   ============================================================ */
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.getElementById('scene').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020803, 0.12);

const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, .1, 100);
camera.position.set(0, 0.1, 4.6);

scene.add(new THREE.AmbientLight(0x062b12, 1.4));
const key = new THREE.DirectionalLight(0x33ff88, 0.9);
key.position.set(1.5, 2, 3);
scene.add(key);
const rim = new THREE.DirectionalLight(0x00ff66, 1.6);
rim.position.set(-2, 1, -3);
scene.add(rim);
const eyeGlowLight = new THREE.PointLight(0x00ff66, 0.7, 6);
eyeGlowLight.position.set(0, 0.2, 2);
scene.add(eyeGlowLight);

/* ============================================================
   4. FLAME HEAD — decode baked data from head_data.js
   ------------------------------------------------------------
   HEAD_DATA holds the FLAME 2023 Open head (eyeballs stripped),
   4 identity morph deltas (vs identity 0 as base) + 2 chaos
   deltas, cylindrical UVs, and per-identity eye/mouth rigs.
   FLAME 2023 Open: CC-BY-4.0 — Li et al., SIGGRAPH Asia 2017.
   ============================================================ */
const b64f32 = s => new Float32Array(Uint8Array.from(atob(s), c=>c.charCodeAt(0)).buffer);
const b64u16 = s => new Uint16Array(Uint8Array.from(atob(s), c=>c.charCodeAt(0)).buffer);

const IDENTITY_NAMES = HEAD_DATA.meta.identities;
const N_ID = IDENTITY_NAMES.length;          // 5
const RIGS = HEAD_DATA.rigs;
const CHAOS_A = N_ID - 1;                    // morph slots: 0..3 identities 1..4
const CHAOS_B = N_ID;                        // 4 = chaos1, 5 = chaos2

const headGeo = new THREE.BufferGeometry();
headGeo.setAttribute('position', new THREE.BufferAttribute(b64f32(HEAD_DATA.pos), 3));
headGeo.setAttribute('uv',       new THREE.BufferAttribute(b64f32(HEAD_DATA.uv), 2));
headGeo.setIndex(new THREE.BufferAttribute(b64u16(HEAD_DATA.idx), 1));
headGeo.computeVertexNormals();
headGeo.morphTargetsRelative = true;         // targets are deltas
headGeo.morphAttributes.position =
  HEAD_DATA.targets.map(t => new THREE.BufferAttribute(b64f32(t), 3));

/* optional Phase-6 speech animation (anim_data.js, via tools/bake_anim.py):
   per-frame vertex deltas stream into one extra morph slot held at
   influence 1, composing cleanly with identity + chaos morphs */
const N_MORPH = HEAD_DATA.targets.length;       // 6 baked targets
/* the speech slot always exists (zeroed = inert), so clips can be
   loaded/swapped at runtime without touching the morph setup */
const speechAttr = new THREE.BufferAttribute(
  new Float32Array(b64f32(HEAD_DATA.pos).length), 3);
speechAttr.setUsage(THREE.DynamicDrawUsage);
headGeo.morphAttributes.position.push(speechAttr); // slot N_MORPH
let speech = null;
function loadSpeech(p, audioSrc){
  if(speech && speech.playing) stopSpeech();
  speech = {
    raw: new Int16Array(
      Uint8Array.from(atob(p.data), c=>c.charCodeAt(0)).buffer),
    sIdx: b64u16(p.sparseIdx),
    attr: speechAttr,
    frames: p.frames, fps: p.fps, scale: p.scale,
    playing: false, t0: 0,
    audio: audioSrc ? new Audio(audioSrc) : null,
  };
}
if (typeof ANIM_DATA !== 'undefined'){
  loadSpeech(ANIM_DATA, ANIM_DATA.wav || null);
}

const headGroup = new THREE.Group();
scene.add(headGroup);

const skullMat = new THREE.MeshPhongMaterial({
  color: 0x021006,
  emissive: 0x00ff66,
  emissiveMap: gridTex,
  emissiveIntensity: 0.95,
  specular: 0x113322,
  shininess: 18,
  morphTargets: true,
});
const skull = new THREE.Mesh(headGeo, skullMat);
headGroup.add(skull);

/* wireframe shell shares the geometry (and therefore the morphs) */
const shell = new THREE.Mesh(headGeo, new THREE.MeshBasicMaterial({
  color:0x00ff66, wireframe:true, transparent:true, opacity:0.05, morphTargets:true
}));
shell.scale.setScalar(1.004);
headGroup.add(shell);

/* hollow eyes: black voids filling the (now empty) FLAME sockets */
function makeEye(){
  const eye = new THREE.Group();
  const socket = new THREE.Mesh(
    new THREE.SphereGeometry(1, 32, 32),
    new THREE.MeshBasicMaterial({color:0x000000})
  );
  eye.add(socket);
  eye.userData = {socket};      // just the hollow void — no glow ring/halo
  return eye;
}
const eyeL = makeEye(), eyeR = makeEye();
headGroup.add(eyeL, eyeR);

/* The mouth was a separate dark slit prop, but with only a single rig anchor
   (no lip contour) it never sat cleanly on the lips across the morphing
   identities — it read as a wonky floating line. Off by default; FLAME's own
   lips in the LED skin carry the mouth. Flip to true to restore the slit. */
const SHOW_MOUTH_SLIT = false;
const mouth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 24, 24),
  new THREE.MeshBasicMaterial({color:0x000300})
);
mouth.visible = SHOW_MOUTH_SLIT;
headGroup.add(mouth);

const lerp = (a,b,t)=>a+(b-a)*t;
const lerp3 = (a,b,t)=>[lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t)];

/* place eye/mouth props for a blend between two identity rigs */
function applyRig(ai, bi, t, jit){
  const A = RIGS[ai], B = RIGS[bi];
  [[eyeL,'eyeL'],[eyeR,'eyeR']].forEach(([eye,k])=>{
    const c = lerp3(A[k].c, B[k].c, t);
    const r = lerp(A[k].r, B[k].r, t);
    eye.position.set(c[0] + (Math.random()-.5)*jit*.05,
                     c[1] + (Math.random()-.5)*jit*.05,
                     c[2]);
    const s = r*1.35;                       // overfill the socket -> void
    eye.userData.socket.scale.setScalar(s);
    eye.rotation.y = Math.sign(c[0])*0.28;
  });
  if(SHOW_MOUTH_SLIT){
    const m = lerp3(A.mouth, B.mouth, t);
    mouth.scale.set(0.16, 0.020 + jit*0.02*Math.random(), 0.05);
    mouth.position.set(m[0] + (Math.random()-.5)*jit*.04, m[1], m[2] + 0.015);
  }
}
applyRig(0, 0, 0, 0);

/* halo + motes */
const haloCv = document.createElement('canvas');
haloCv.width = haloCv.height = 256;
const hctx = haloCv.getContext('2d');
const grad = hctx.createRadialGradient(128,128,10,128,128,128);
grad.addColorStop(0,'rgba(0,255,102,0.55)');
grad.addColorStop(0.5,'rgba(0,255,102,0.12)');
grad.addColorStop(1,'rgba(0,255,102,0)');
hctx.fillStyle = grad;
hctx.fillRect(0,0,256,256);
const halo = new THREE.Sprite(new THREE.SpriteMaterial({
  map:new THREE.CanvasTexture(haloCv),
  blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.85
}));
halo.scale.set(4.4,4.4,1);
halo.position.z = -0.6;
scene.add(halo);

const moteGeo = new THREE.BufferGeometry();
const N = 160, mp = new Float32Array(N*3);
for(let i=0;i<N;i++){
  mp[i*3]   = (Math.random()-0.5)*8;
  mp[i*3+1] = (Math.random()-0.5)*5;
  mp[i*3+2] = (Math.random()-0.5)*4 - 1;
}
moteGeo.setAttribute('position', new THREE.BufferAttribute(mp,3));
const motes = new THREE.Points(moteGeo, new THREE.PointsMaterial({
  color:0x00ff66, size:0.02, transparent:true, opacity:0.5,
  blending:THREE.AdditiveBlending, depthWrite:false
}));
scene.add(motes);

/* ============================================================
   5. SHAPE-SHIFT CHOREOGRAPHY (relative morph targets)
   ------------------------------------------------------------
   base mesh = identity 0; targets 0..3 = deltas to identities
   1..4; targets 4,5 = chaos noise. Blending i -> j at e:
     influence[i-1] = 1-e (if i>0), influence[j-1] = e (if j>0)
   ============================================================ */
const MORPH_MS = 2600;
const statusEl = document.getElementById('status');
let curId = 0, nxtId = 0;
let phase = 'hold', phaseStart = 0, holdDur = 5200;
const easeInOut = u => u<.5 ? 4*u*u*u : 1-Math.pow(-2*u+2,3)/2;

function setInfluences(mesh, cur, nxt, e, c1, c2){
  const inf = mesh.morphTargetInfluences;
  for(let i=0;i<N_MORPH;i++) inf[i]=0;
  if(cur>0) inf[cur-1] = 1-e;
  if(nxt>0) inf[nxt-1] = e;
  inf[CHAOS_A] = c1;
  inf[CHAOS_B] = c2;
  inf[N_MORPH] = 1;   // speech slot: zeroed attribute when idle
}
setInfluences(skull,0,0,0,0,0);
setInfluences(shell,0,0,0,0,0);

function updateShapeShift(t){
  if(phase==='hold'){
    if(t-phaseStart > holdDur){
      phase='morph'; phaseStart=t;
      nxtId = (curId + 1 + Math.floor(Math.random()*(N_ID-1))) % N_ID;
      statusEl.textContent = `RESEQUENCING → FORM ${IDENTITY_NAMES[nxtId].slice(0,2)}`;
      statusEl.classList.add('resequencing');
    } else {
      glitchLevel = Math.max(0, glitchLevel-0.05);
      applyRig(curId, curId, 0, 0);
      setInfluences(skull,curId,curId,0,0,0);
      setInfluences(shell,curId,curId,0,0,0);
    }
  }
  if(phase==='morph'){
    const u = Math.min(1,(t-phaseStart)/MORPH_MS);
    const e = easeInOut(u);
    const bump = Math.sin(Math.PI*u);
    const c1 = bump*0.55*(0.5+0.5*Math.sin(t*0.021));
    const c2 = bump*0.45*(0.5-0.5*Math.sin(t*0.017));
    glitchLevel = bump;
    setInfluences(skull,curId,nxtId,e,c1,c2);
    setInfluences(shell,curId,nxtId,e,c1,c2);
    applyRig(curId, nxtId, e, bump);
    if(u>=1){
      curId = nxtId; phase='hold'; phaseStart=t;
      holdDur = 5000 + Math.random()*4000;
      glitchLevel = 0;
      statusEl.textContent = `FORM ${IDENTITY_NAMES[curId]} · STABLE`;
      statusEl.classList.remove('resequencing');
    }
  }
}

/* speech playback: interpolate baked frames into the speech slot */
function updateSpeech(t){
  if(!speech || !speech.playing) return;
  const f = (t - speech.t0)/1000 * speech.fps;
  if(f >= speech.frames-1){ stopSpeech(); return; }
  const i0 = Math.floor(f), fr = f - i0;
  const a = speech.attr.array, raw = speech.raw, s = speech.scale;
  const sIdx = speech.sIdx, nS = sIdx.length, stride = nS*3;
  const o0 = i0*stride, o1 = o0+stride;
  for(let k=0;k<nS;k++){
    const vi = sIdx[k]*3, o = k*3;
    a[vi]   = (raw[o0+o]  *(1-fr) + raw[o1+o]  *fr) * s;
    a[vi+1] = (raw[o0+o+1]*(1-fr) + raw[o1+o+1]*fr) * s;
    a[vi+2] = (raw[o0+o+2]*(1-fr) + raw[o1+o+2]*fr) * s;
  }
  speech.attr.needsUpdate = true;
}
function startSpeech(){
  if(!speech) return;
  speech.playing = true; speech.t0 = performance.now();
  mouth.visible = false;                 // FLAME's real lips take over
  if(speech.audio){ speech.audio.currentTime = 0; speech.audio.play().catch(()=>{}); }
  statusEl.textContent = `FORM ${IDENTITY_NAMES[curId]} · SPEAKING`;
}
function stopSpeech(){
  if(!speech) return;
  speech.playing = false;
  speech.attr.array.fill(0); speech.attr.needsUpdate = true;
  mouth.visible = SHOW_MOUTH_SLIT;
  if(speech.audio) speech.audio.pause();
  statusEl.textContent = `FORM ${IDENTITY_NAMES[curId]} · STABLE`;
}
addEventListener('keydown', e=>{
  if(e.target && e.target.tagName === 'INPUT') return;
  if(e.code==='Space' && speech){
    e.preventDefault();
    speech.playing ? stopSpeech() : startSpeech();
  }
});
if(speech){
  document.getElementById('status').textContent += ' — [SPACE] SPEAKS';
}

/* --- UPLINK: on-the-fly speech + local-LLM brain (tools/speak_server.py) -
   The server runs on the user's machine; if it answers /ping the input bar
   appears. /ping reports a brain status enum (offline|pulling|warming|ready|
   error). When the brain is READY the bar ASKS (routes /ask, the head answers
   the question); otherwise it SPEAKS the literal text (routes /speak). The
   mode is shown in the placeholder + button and re-checked at send time, so a
   question is never silently spoken back. Note: an httpS page cannot call
   http://localhost (mixed content) — open index.html locally / via the shell. */
const UPLINK = 'http://localhost:8765';
const uplinkEl = document.getElementById('uplink');
const uplinkText = document.getElementById('uplink-text');
const uplinkSend = document.getElementById('uplink-send');
const askCaption = document.getElementById('ask-caption');

let uplink = { online:false, brain:'none', model:null };

// --- ask-state caption: the head's visible feedback (esp. in overlay mode) ---
// Routes every ask-state to one aria-live line under the head, so the desktop
// overlay (which hides the footer #status) never shows silent dead air.
let askClearTimer = null;
function setAskStatus(text, kind, fadeMs){
  clearTimeout(askClearTimer);
  if(!text){ askCaption.className = ''; askCaption.textContent = ''; return; }
  askCaption.textContent = text;
  askCaption.className = 'show' + (kind ? ' ' + kind : '');
  askCaption.setAttribute('aria-live', kind === 'error' ? 'assertive' : 'polite');
  const fade = fadeMs != null ? fadeMs : ({ info:3000, error:5000, reply:8000 })[kind];
  if(fade) askClearTimer = setTimeout(()=>{
    if(askCaption.textContent === text) setAskStatus('');
  }, fade);
}
// pure (unit-tested in Node): brain state -> caption {text, kind}
function brainCaption(brain, model){
  const m = model ? ` (${model})` : '';
  if(brain === 'ready') return { text:`BRAIN ONLINE${m}`, kind:'info' };
  if(brain === 'pulling' || brain === 'warming') return { text:'BRAIN LOADING…', kind:'loading' };
  if(brain === 'offline' || brain === 'error') return { text:'BRAIN OFFLINE', kind:'offline' };
  if(brain === 'none') return { text:'UPLINK ONLINE', kind:'info' };
  return { text:'', kind:'' };
}

// pure helpers (unit-tested headlessly in Node): endpoint + bar copy per state
function uplinkEndpoint(brain){ return brain === 'ready' ? '/ask' : '/speak'; }
function uplinkPlaceholder(brain){
  if(brain === 'ready') return 'ASK THE HEAD';
  if(brain === 'pulling' || brain === 'warming') return 'BRAIN LOADING… type to speak';
  return 'TYPE — THE HEAD WILL SPEAK';
}

function applyUplinkUI(){
  uplinkEl.style.display = uplink.online ? 'flex' : 'none';
  if(!uplink.online) return;
  uplinkText.placeholder = uplinkPlaceholder(uplink.brain);
  uplinkSend.textContent = uplink.brain === 'ready' ? 'ASK' : 'TRANSMIT';
}

async function pingUplink(){
  try{
    const j = await (await fetch(UPLINK + '/ping')).json();
    if(!j.ok) return;
    uplink.online = true;
    const prevBrain = uplink.brain;
    uplink.brain = j.brain || 'none';      // older servers omit brain -> speak-only
    uplink.model = j.model || null;
    applyUplinkUI();
    if(uplink.brain !== prevBrain){        // announce only on change, not every poll
      const c = brainCaption(uplink.brain, uplink.model);
      setAskStatus(c.text, c.kind);
    }
    if(uplink.brain === 'pulling' || uplink.brain === 'warming')
      setTimeout(pingUplink, 3000);        // poll until the brain warms, then flip live
  }catch(e){ /* server not running; bar stays hidden */ }
}
pingUplink();

async function transmit(){
  const text = uplinkText.value.trim();
  if(!text || uplinkSend.disabled) return;
  const ask = uplink.brain === 'ready';    // re-checked at send time, never silent
  uplinkSend.disabled = true;
  setAskStatus(ask ? '· THINKING' : '· SYNTHESIZING', 'thinking');  // <50ms "I heard you"
  try{
    const r = await fetch(UPLINK + uplinkEndpoint(uplink.brain), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})});
    const p = await r.json().catch(()=>({}));
    if(!r.ok){
      if(p.brain){ uplink.brain = p.brain; applyUplinkUI(); }   // e.g. 503 brain warming
      throw new Error(p.error || ('HTTP ' + r.status));
    }
    if(p.tooLong){                         // reply produced but too long to speak
      setAskStatus(p.reply || 'reply too long to speak', 'reply');  // show it, don't lose it
      uplinkText.value = '';
      return;
    }
    loadSpeech(p, p.audioB64 ? 'data:audio/wav;base64,' + p.audioB64 : null);
    setAskStatus(p.reply || '', 'reply', 14000);  // subtitle the spoken answer (a11y / muted)
    startSpeech();                          // sets · SPEAKING on the footer identity line
    uplinkText.value = '';
  }catch(err){
    setAskStatus((ask ? 'BRAIN ERROR: ' : 'UPLINK ERROR: ') + err.message, 'error');
  }finally{
    uplinkSend.disabled = false;
  }
}
uplinkSend.addEventListener('click', transmit);
uplinkText.addEventListener('keydown', e=>{
  if(e.code==='Enter') transmit();
});

/* ============================================================
   6. CONSTRAINED HEAD MOTION (unchanged limits)
   yaw ±1.0 rad (~57°) · pitch -0.12 rad up … +0.50 rad down
   ============================================================ */
const YAW_MAX = 1.0;
const PITCH_UP = -0.12, PITCH_DOWN = 0.50;
const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));

let targetYaw = 0, targetPitch = 0;
let lastMouseMove = -1e9;

function pointTo(cx, cy){
  const nx = (cx/innerWidth )*2 - 1;
  const ny = (cy/innerHeight)*2 - 1;
  targetYaw   = clamp(nx*YAW_MAX, -YAW_MAX, YAW_MAX);
  targetPitch = clamp(ny>0 ? ny*PITCH_DOWN : ny*-PITCH_UP, PITCH_UP, PITCH_DOWN);
  lastMouseMove = performance.now();
}
if(!OVERLAY){
  addEventListener('mousemove', e=>pointTo(e.clientX,e.clientY));
  addEventListener('touchmove', e=>pointTo(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
}

/* --- DESKTOP SHELL HOOKS --------------------------------------------
   The native shell feeds the global cursor as already-normalized coords
   (page convention: +x right, +y down, each in [-1,1]) so the head can
   watch the cursor anywhere on screen, focused or not. __conduitGrab
   toggles the faint interactive frame. */
window.__conduitPoint = function(nx, ny){
  nx = clamp(nx, -1, 1); ny = clamp(ny, -1, 1);
  targetYaw   = clamp(nx*YAW_MAX, -YAW_MAX, YAW_MAX);
  targetPitch = clamp(ny>0 ? ny*PITCH_DOWN : ny*-PITCH_UP, PITCH_UP, PITCH_DOWN);
  lastMouseMove = performance.now();
};
window.__conduitGrab = function(on){
  document.body.classList.toggle('grab', !!on);
  // grabbing makes the overlay interactive — focus the input so you can ask at once
  if(on) setTimeout(()=>{ try{ uplinkText.focus(); }catch(e){} }, 0);
};

let idleSeed = Math.random()*100;
function idleTargets(t){
  const s = t*0.001 + idleSeed;
  let yaw = Math.sin(s*0.31)*0.55 + Math.sin(s*0.13+2)*0.35;
  const dipPhase = (Math.sin(s*0.09) + Math.sin(s*0.23+1.3))*0.5;
  let pitch = 0.06 + Math.max(0, dipPhase)*0.42;
  if(pitch > 0.3) yaw *= 0.35;
  return [clamp(yaw,-YAW_MAX,YAW_MAX), clamp(pitch,PITCH_UP,PITCH_DOWN)];
}

/* ============================================================
   7. LOOP
   ============================================================ */
let texTick = 0;
function animate(t){
  requestAnimationFrame(animate);

  const texRate = glitchLevel>0.05 ? 45 : 90;
  if(t - texTick > texRate){ paintGrid(t); gridTex.needsUpdate = true; texTick = t; }

  updateShapeShift(t);
  updateSpeech(t);

  if(t - lastMouseMove > 2500){
    const [iy, ip] = idleTargets(t);
    targetYaw = iy; targetPitch = ip;
  }

  headGroup.rotation.y += (targetYaw  - headGroup.rotation.y)*0.045;
  headGroup.rotation.x += (targetPitch- headGroup.rotation.x)*0.045;
  headGroup.rotation.z = Math.sin(t*0.0007)*0.02
                       + (glitchLevel>0 ? (Math.random()-.5)*0.02*glitchLevel : 0);
  headGroup.position.y = Math.sin(t*0.0011)*0.04;

  headGroup.rotation.y = clamp(headGroup.rotation.y, -YAW_MAX, YAW_MAX);
  headGroup.rotation.x = clamp(headGroup.rotation.x, PITCH_UP, PITCH_DOWN);

  motes.rotation.y = t*0.00004;
  halo.material.opacity = 0.75 + Math.sin(t*0.002)*0.1 + glitchLevel*0.15;

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  sizeRain();
});
</script>
